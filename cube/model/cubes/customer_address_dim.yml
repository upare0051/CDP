cubes:
  - name: customer_address_dim
    # SCD2 table: filter to current row so joins are 1:1.
    sql: "SELECT * FROM gold.customer_address_dim WHERE is_current = true"
    description: Current address per customer (SCD2; filtered to is_current).

    dimensions:
      - name: customer_id
        sql: customer_id
        type: number
        primary_key: true
        public: false
      - name: country_code
        sql: country_code
        type: string
      - name: state
        sql: state
        type: string
      - name: city
        sql: city
        type: string
      - name: zip_code
        sql: zip_code
        type: string
      - name: snapshot_updated_at
        sql: snapshot_updated_at
        type: time
      - name: effective_from
        sql: effective_from
        type: time

    measures:
      - name: count
        type: count
