cubes:
  - name: customer_identifier_dim
    # SCD2 table: filter to current row so joins are 1:1.
    sql: "SELECT * FROM gold.customer_identifier_dim WHERE is_current = true"
    description: Current contact identifiers per customer (email, phone). SCD2 filtered to is_current.

    dimensions:
      - name: customer_id
        sql: customer_id
        type: number
        primary_key: true
        public: false
      - name: email
        sql: email
        type: string
      - name: email_norm
        sql: email_norm
        type: string
      - name: phone
        sql: phone
        type: string
      - name: phone_norm
        sql: phone_norm
        type: string
      - name: source_system
        sql: source_system
        type: string
      - name: snapshot_updated_at
        sql: snapshot_updated_at
        type: time

    measures:
      - name: count
        type: count
