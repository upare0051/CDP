# nginx reverse proxy for the unified cdp-main experience.
#
# Routes (longest-prefix first):
#   /api/v1/*          -> cdp-main FastAPI backend
#   /cubejs-api/*      -> Cube semantic layer
#   /dashboard/*       -> Dittofeed (journey builder, "Journeys" tab in nav)
#   /api/*             -> Dittofeed API (after /api/v1 is matched first)
#   /                  -> cdp-main React frontend (Vite dev w/ HMR)
#
# Users land on http://localhost/ and everything is served from one
# origin — no iframe, no domain hop, no "this is a different product" feel.

worker_processes auto;

events {
  worker_connections 1024;
}

http {
  # Map HTTP Upgrade header for WebSocket upgrades (Vite HMR + Dittofeed).
  map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
  }

  # Reasonable defaults for a local dev / demo proxy.
  client_max_body_size 50m;
  proxy_read_timeout 600s;
  proxy_send_timeout 600s;
  proxy_buffering off;

  upstream cdp_backend  { server backend:8000; }
  upstream cdp_frontend { server frontend:5173; }
  upstream cube_api     { server cube-api:4000; }
  upstream dittofeed    { server journeys-lite:3000; }

  server {
    listen 80;
    server_name _;

    # ---- cdp-main backend (most specific first) ----
    location /api/v1/ {
      proxy_pass         http://cdp_backend;
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ---- Cube semantic layer (REST + WS) ----
    location /cubejs-api/ {
      proxy_pass         http://cube_api;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade $http_upgrade;
      proxy_set_header   Connection $connection_upgrade;
      proxy_set_header   Host $host;
    }

    # ---- Override CSS served by nginx itself ----
    # Loaded into Dittofeed HTML responses below via sub_filter. Lets us
    # strip Dittofeed branding without rebuilding their image.
    location = /dashboard-overrides.css {
      root /etc/nginx/overrides;
      add_header Cache-Control "public, max-age=60";
      types { } default_type "text/css";
    }

    # ---- Dittofeed dashboard (basePath baked into Next.js) ----
    location /dashboard/ {
      proxy_pass         http://dittofeed;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade $http_upgrade;
      proxy_set_header   Connection $connection_upgrade;
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;

      # Disable upstream gzip so sub_filter can see the response body to
      # rewrite. The compressed re-encoding the browser sees from us is fine.
      proxy_set_header   Accept-Encoding "";

      # Rewrite branding on every Dittofeed HTML response. sub_filter only
      # runs on Content-Type matching sub_filter_types.
      sub_filter '<title>Dittofeed</title>' '<title>Alo ActivationOS</title>';
      sub_filter '</head>' '<link rel="stylesheet" href="/dashboard-overrides.css"></head>';
      sub_filter_once off;
      sub_filter_types text/html;
    }

    # ---- Dittofeed API (after /api/v1 matched above) ----
    location /api/ {
      proxy_pass         http://dittofeed;
      proxy_http_version 1.1;
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ---- cdp-main React frontend (default, fallback) ----
    location / {
      proxy_pass         http://cdp_frontend;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade $http_upgrade;       # Vite HMR
      proxy_set_header   Connection $connection_upgrade;
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
    }
  }
}
