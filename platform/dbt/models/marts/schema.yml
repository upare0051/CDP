version: 2

models:
  - name: mart_customer_360
    description: "Customer 360 golden mart for analytics and activation."
    columns:
      - name: customer_id
        data_tests: [not_null, unique]
      - name: external_id
        data_tests: [not_null, unique]
      - name: email
        description: "May be null for customers without email identity."

  - name: mart_segment_base
    description: "Segment-level metrics and health for product/dashboard usage."
    columns:
      - name: segment_id
        data_tests: [not_null, unique]
      - name: segment_name
        data_tests: [not_null]
      - name: computed_member_count
        data_tests:
          - dbt_utils.accepted_range:
              min_value: 0

  - name: mart_activation_performance
    description: "Activation-level run metrics for operational monitoring."
    columns:
      - name: activation_id
        data_tests: [not_null, unique]
      - name: segment_id
        data_tests: [not_null]
      - name: destination_id
        data_tests: [not_null]
      - name: total_runs
        data_tests:
          - dbt_utils.accepted_range:
              min_value: 0

  - name: mart_ai_customer_insights_team
    description: "Latest customer-level AI insights tailored for CS/Sales operational usage."
    columns:
      - name: customer_id
        data_tests: [not_null, unique]
      - name: churn_score
        data_tests:
          - dbt_utils.accepted_range:
              min_value: 0
              max_value: 1
      - name: cs_action_bucket
        data_tests:
          - accepted_values:
              values: ['priority_followup', 'monitor', 'healthy']

  - name: mart_ai_audience_recommendations_team
    description: "Audience recommendation mart for DA/DS and GTM planning teams."
    columns:
      - name: run_id
        data_tests: [not_null]
      - name: goal
        data_tests: [not_null]
      - name: recommendation_index
        data_tests: [not_null]
